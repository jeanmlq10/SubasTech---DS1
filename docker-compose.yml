services:
  postgres:
    image: postgres:16-alpine
    container_name: subastech-postgres
    environment:
      POSTGRES_DB: subastech
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - subastech_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d subastech"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  subastech_postgres_data:
name: Individual backend tests

on:
  workflow_call:
  workflow_dispatch:

jobs:
  django-app-tests:
    name: Backend | ${{ matrix.app }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        app:
          - accounts
          - adminpanel
          - appointments
          - auctions
          - audit
          - catalog
          - disputes
          - leads
          - llm
          - notifications
          - recommendations
          - reputation
          - telegram_bot
    env:
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      DJANGO_DEBUG: "true"
      USE_SQLITE_FOR_TESTS: "true"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run Django tests for app
        run: python manage.py test ${{ matrix.app }}
